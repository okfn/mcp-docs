site_name: OKFN MCP Platform
site_description: >-
  Open documentation for the OKFN MCP platform: answering questions
  with open data, with full traceability.
site_url: https://okfn.github.io/mcp-docs/
repo_url: https://github.com/okfn/mcp-docs
repo_name: okfn/mcp-docs
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  icon:
    logo: material/database-search
    repo: fontawesome/brands/github
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

extra_css:
  - stylesheets/extra.css

# Pin Mermaid to v10.
#
# Material loads Mermaid 11 from a CDN, but only if `window.mermaid` is not
# already defined, so loading v10 here takes precedence. We do this because
# Mermaid 11 renames the arrowhead marker to "<diagram-id>-arrowhead", which
# no longer matches the "#arrowhead path" selector in Material's stylesheet.
# Nothing then paints the arrowheads and they fall back to black, which is
# invisible in dark mode. Mermaid 10 keeps the plain "arrowhead" id.
#
# Remove this line once Material's stylesheet matches Mermaid 11's markers,
# and check that arrowheads are still visible in dark mode.
extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Overview:
      - overview/index.md
      - The idea: overview/idea.md
      - The challenge: overview/challenges.md
      - An open model for Latin America: overview/open-model.md
      - Architecture: overview/architecture.md
      - Repositories: overview/repositories.md
  - Getting started:
      - getting-started/index.md
      - Run the MCP server: getting-started/mcp-server.md
      - Run the chat gateway: getting-started/chat-gateway.md
      - Test with MCP Inspector: getting-started/inspector.md
  - Plugins:
      - plugins/index.md
      - YAML datasets: plugins/yaml-datasets.md
      - Python tools: plugins/python-tools.md
      - Tool results: plugins/tool-results.md
      - Describe your plugin: plugins/plugin-info.md
      - Connect to a server: plugins/connect.md
  - Data catalogs:
      - catalogs/index.md
      - Uruguay: catalogs/uruguay.md
      - Brasil: catalogs/brasil.md
  - Lessons from the pilots:
      - lessons/index.md
      - Two pilots: lessons/two-pilots.md
      - Connecting the data is the easy part: lessons/meaning.md
      - Scope plugins narrowly: lessons/scope.md
      - The YAML trade-off: lessons/yaml-tradeoff.md
      - Reliability of calculations: lessons/calculations.md
      - Transparency and trust: lessons/transparency.md
      - Data quality and openness: lessons/data-quality.md
      - New tools, old problems: lessons/data-access.md
      - Testing is not simple: lessons/testing.md
      - A domain glossary: lessons/glossary.md
      - Open data resources: lessons/resources.md
      - Tables and charts: lessons/presentation.md
      - No accounts, no database: lessons/no-database.md
      - Strengths and weaknesses: lessons/summary.md
  - Operations:
      - operations/index.md
      - Deployment: operations/deployment.md
  - Contributing: contributing.md
